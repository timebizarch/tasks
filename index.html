<style>
  :root {
    /* Yuca brand tokens — Manual de Marca Yuca */
    --paper: #FDFAF7; --card: #FFFFFF; --ink: #062840; --muted: #425158; --muted-2: #5B6570;
    --line: #DDE1E3; --line-strong: #BBC3C7; --done: #13C081;
    --accent: #12C68B; --accent-dark: #098C7B; --accent-lighten: #F2FBF7;
    --link: #076B5A;
    --today: #CE6363; --today-bg: #FEF5F5;
    --week: #07C1D6; --week-bg: #EEF7FB;
    --wait: #7B17A2; --wait-bg: #FDFAFF;
    --later: #8E9BA1; --later-bg: #F4F5F6;
    --error: #B8265A; --error-bg: #FDF4F4;
    --alert: #8A5A05; --alert-bg: #FFFAF1;
    --overdue: #B23A0E; --overdue-bg: #FDF1EA;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px; --radius-pill: 999px;
    --shadow-sm: 0 2px 6px rgba(16,36,54,.06), 0 1px 2px rgba(16,36,54,.04);
    --shadow-md: 0 6px 16px rgba(16,36,54,.08), 0 2px 4px rgba(16,36,54,.04);
    --shadow-lg: 0 20px 48px rgba(6,40,64,.16), 0 4px 10px rgba(6,40,64,.08);
    --shadow-focus: 0 0 0 3px rgba(19,192,129,.25);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Montserrat', system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--font-body); line-height: 1.45; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 28px 20px 60px; }

  header.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
  h1 { font-family: var(--font-display); font-size: 25px; font-weight: 700; letter-spacing: -0.01em; margin: 0; display: flex; align-items: center; gap: 9px; }
  h1 .logo { flex: none; }
  h1 span { color: var(--muted); font-weight: 500; font-size: 0.8em; }
  .who { color: var(--muted); font-size: 13px; }
  .who button { border: none; background: none; color: var(--link); cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0 0 0 8px; }
  .date { color: var(--muted); font-size: 13px; text-transform: capitalize; margin-bottom: 20px; }

  .capture { display: flex; gap: 8px; margin-bottom: 6px; }
  .capture input { flex: 1; font-size: 15px; padding: 13px 15px; border: 1.5px solid var(--line); border-radius: var(--radius-md); background: var(--card); color: var(--ink); outline: none; font-family: var(--font-body); transition: border-color 150ms, box-shadow 150ms; }
  .capture input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .capture input[type="date"] { flex: none; width: 132px; font-size: 13.5px; padding: 0 10px; }
  .capture .meta-urgent-btn { flex: none; padding: 0 13px; }
  .capture button { border: none; background: var(--accent-dark); color: #fff; font-size: 14px; font-weight: 700; padding: 0 20px; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font-body); transition: filter 150ms; }
  .capture button:hover { filter: brightness(0.88); }
  .hint { color: var(--muted); font-size: 12.5px; margin: 0 2px 20px; }

  .inbox { background: var(--card); border: 1.5px dashed var(--line-strong); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 22px; }
  .inbox.empty { display: none; }
  .inbox h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 10px; font-weight: 700; }
  .inbox-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-top: 1px solid var(--line); }
  .inbox-item:first-of-type { border-top: none; }
  .inbox-item .txt { flex: 1; font-size: 14.5px; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { border: 1px solid var(--line); background: var(--paper); border-radius: var(--radius-pill); font-size: 11.5px; padding: 4px 10px; cursor: pointer; color: var(--ink); white-space: nowrap; font-family: var(--font-body); }
  .chip:hover { border-color: var(--ink); }
  .chip.c-today:hover { background: var(--today-bg); border-color: var(--today); }
  .chip.c-week:hover { background: var(--week-bg); border-color: var(--week); }
  .chip.c-wait:hover { background: var(--wait-bg); border-color: var(--wait); }
  .chip.c-later:hover { background: var(--later-bg); border-color: var(--later); }
  .x { border: none; background: none; color: var(--muted-2); cursor: pointer; font-size: 17px; line-height: 1; padding: 6px 7px; }
  .x:hover { color: var(--error); }

  .filters { display: flex; align-items: center; gap: 8px; margin: 2px 0 18px; flex-wrap: wrap; }
  .search-input { font-size: 12.5px; padding: 6px 12px; border: 1px solid var(--line); border-radius: var(--radius-pill); font-family: var(--font-body); background: var(--card); color: var(--ink); outline: none; width: 180px; }
  .search-input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .fchip { border: 1px solid var(--line); background: var(--card); border-radius: var(--radius-pill); font-size: 12.5px; padding: 6px 14px; cursor: pointer; font-family: var(--font-body); color: var(--muted); }
  .fchip.on { background: var(--error-bg); border-color: var(--error); color: var(--error); font-weight: 700; }
  .filters select { font-size: 12.5px; padding: 6px 10px; border: 1px solid var(--line); border-radius: var(--radius-pill); font-family: var(--font-body); background: var(--card); color: var(--ink); }
  .fclear { border: none; background: none; color: var(--muted); font-size: 12px; text-decoration: underline; cursor: pointer; font-family: var(--font-body); }

  .week-strip { display: flex; gap: 6px; margin: 0 0 18px; }
  .week-day { flex: 1; min-width: 0; text-align: center; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 8px 2px; }
  .week-day.today { border-color: var(--accent); background: var(--accent-lighten); }
  .wd-label { display: block; font-size: 10px; text-transform: uppercase; color: var(--muted-2); letter-spacing: 0.04em; }
  .wd-num { display: block; font-size: 15px; font-weight: 700; color: var(--ink); margin-top: 2px; }
  .wd-count { display: inline-block; margin-top: 4px; background: var(--today); color: #fff; border-radius: var(--radius-pill); font-size: 10.5px; padding: 1px 7px; font-weight: 700; }

  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 860px) { .board { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .board { grid-template-columns: 1fr; } }
  .col { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius-lg); padding: 14px; min-height: 120px; min-width: 0; box-shadow: var(--shadow-sm); }
  .col-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .col-title { font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .bicon { display: inline-flex; }
  .bi-hoje { color: var(--today); } .bi-semana { color: var(--week); }
  .bi-aguardando { color: var(--wait); } .bi-depois { color: var(--later); }
  .col-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
  .col[data-b="hoje"] { border-top: 3px solid var(--today); }
  .col[data-b="semana"] { border-top: 3px solid var(--week); }
  .col[data-b="aguardando"] { border-top: 3px solid var(--wait); }
  .col[data-b="depois"] { border-top: 3px solid var(--later); }
  .over { color: var(--error); font-weight: 700; }

  .task { border-top: 1px solid var(--line); padding: 9px 0; }
  .task:first-of-type { border-top: none; }
  .task-row { display: flex; align-items: flex-start; gap: 9px; }
  .cb { margin-top: 3px; width: 20px; height: 20px; cursor: pointer; accent-color: var(--done); flex: none; }
  .task .txt { flex: 1; font-size: 14px; cursor: pointer; }
  .task.done .txt { text-decoration: line-through; color: var(--muted-2); }
  .task .move { display: none; flex-direction: column; gap: 8px; margin: 8px 0 2px 25px; }
  .task.open .move { display: flex; }
  .move-select { align-self: flex-start; font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: var(--radius-sm); font-family: var(--font-body); background: var(--card); color: var(--ink); }
  .empty-note { color: var(--muted-2); font-size: 12.5px; font-style: italic; padding: 4px 0; }
  .chev { flex: none; color: var(--muted-2); cursor: pointer; display: inline-flex; transition: transform 150ms; margin-top: 2px; }
  .task.open .chev { transform: rotate(180deg); }

  .tag-urgent { color: var(--error); margin-right: 3px; }
  .tag-area, .tag-due, .tag-wait { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill); margin-left: 6px; background: var(--later-bg); color: var(--muted); white-space: nowrap; }
  .tag-due-today { background: var(--alert-bg); color: var(--alert); font-weight: 600; }
  .tag-due-overdue { background: var(--overdue-bg); color: var(--overdue); font-weight: 700; }
  .tag-wait { background: var(--wait-bg); color: var(--wait); font-weight: 600; }
  .tag-source { display: inline-flex; align-items: center; gap: 3px; margin-right: 5px; background: var(--later-bg); color: var(--muted-2); border-radius: var(--radius-pill); font-size: 10.5px; padding: 2px 7px 2px 5px; white-space: nowrap; }

  .limit-banner { background: var(--today-bg); color: var(--today); border-radius: var(--radius-sm); font-size: 11.5px; font-weight: 600; padding: 6px 9px; margin-bottom: 10px; }
  .filter-banner { background: var(--accent-lighten); border: 1px solid var(--accent); color: var(--accent-dark); border-radius: var(--radius-md); font-size: 12.5px; font-weight: 600; padding: 8px 14px; margin: 0 0 12px; }

  .meta-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .meta-row input { font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: var(--radius-sm); font-family: var(--font-body); background: var(--card); color: var(--ink); outline: none; }
  .meta-row input[data-area], .meta-row input[data-waiting] { width: 120px; }
  .meta-row input.meta-text { flex: 1 1 100%; }
  .meta-row input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .meta-urgent-btn { font-size: 12px; border: 1px solid var(--line); background: var(--card); border-radius: var(--radius-pill); padding: 5px 11px; cursor: pointer; font-family: var(--font-body); color: var(--muted); }
  .meta-urgent-btn.on { background: var(--error-bg); border-color: var(--error); color: var(--error); font-weight: 700; }
  .clearbtn { margin-top: 8px; border: none; background: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 2px 0; font-family: var(--font-body); }
  .clearbtn:hover { color: var(--done); }

  details.method { margin-top: 30px; border: 1.5px solid var(--line); border-radius: var(--radius-lg); background: var(--card); padding: 4px 18px; }
  details.method summary { cursor: pointer; font-size: 13px; font-weight: 700; padding: 12px 0; list-style: none; }
  details.method summary::-webkit-details-marker { display: none; }
  details.method summary::before { content: "▸ "; color: var(--link); }
  details.method[open] summary::before { content: "▾ "; }
  .method-body { font-size: 13.5px; color: var(--muted); padding-bottom: 16px; }
  .method-body b { color: var(--ink); }
  .method-body p { margin: 0 0 8px; }
  .method-kicker { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; color: var(--accent-dark); margin: 18px 0 6px !important; }
  .method-kicker:first-child { margin-top: 2px !important; }
  .method-body ol, .method-body ul { margin: 0 0 6px; padding-left: 20px; }
  .method-body li { margin-bottom: 5px; }
  .method-rule { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .method-rule span { background: var(--later-bg); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12.5px; }
  .history-table-wrap { overflow-x: auto; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .history-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted-2); font-weight: 700; padding: 0 10px 8px 0; border-bottom: 1px solid var(--line); }
  .history-table td { padding: 7px 10px 7px 0; border-bottom: 1px solid var(--line); color: var(--muted); white-space: nowrap; }
  .history-table td:first-child { color: var(--ink); white-space: normal; }
  .history-table tr:last-child td { border-bottom: none; }

  .auth-wrap { display: grid; grid-template-columns: 1.05fr 1fr; min-height: 560px; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); background: var(--card); margin-top: 16px; }
  @media (max-width: 760px) { .auth-wrap { grid-template-columns: 1fr; min-height: auto; margin-top: 0; } }

  .auth-art { position: relative; overflow: hidden; background: linear-gradient(155deg, var(--ink) 0%, var(--accent-dark) 100%); display: flex; flex-direction: column; justify-content: center; padding: 52px 48px; color: #fff; }
  @media (max-width: 760px) { .auth-art { padding: 40px 28px 52px; } }
  .auth-art .blob { position: absolute; border-radius: 50%; filter: blur(46px); pointer-events: none; }
  .auth-art .blob-1 { width: 240px; height: 240px; background: var(--today); opacity: .55; top: -70px; right: -60px; }
  .auth-art .blob-2 { width: 210px; height: 210px; background: var(--wait); opacity: .5; bottom: -70px; left: -50px; }
  .auth-art .blob-3 { width: 170px; height: 170px; background: var(--week); opacity: .35; bottom: 26px; right: 30px; }
  .auth-art-logo { position: relative; z-index: 1; margin-bottom: 22px; }
  .auth-art h2 { position: relative; z-index: 1; font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1.25; margin: 0 0 12px; max-width: 360px; }
  .auth-art p { position: relative; z-index: 1; font-size: 14px; line-height: 1.55; opacity: .88; max-width: 320px; margin: 0; }

  .auth-form-col { display: flex; align-items: center; justify-content: center; padding: 40px 32px; }
  .center { max-width: 320px; width: 100%; margin: 0; }
  .center h1 { margin-bottom: 6px; }
  .center p { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
  .field { display: block; margin-bottom: 12px; }
  .field input { width: 100%; font-size: 15px; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: var(--radius-md); outline: none; font-family: var(--font-body); background: var(--card); color: var(--ink); transition: border-color 150ms, box-shadow 150ms; }
  .field input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .primary { width: 100%; border: none; background: var(--accent-dark); color: #fff; font-size: 15px; font-weight: 700; padding: 13px; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font-body); transition: filter 150ms; }
  .primary:hover { filter: brightness(0.88); }
  .link { background: none; border: none; color: var(--link); cursor: pointer; font-size: 13.5px; text-decoration: underline; margin-top: 14px; display: inline-block; font-family: var(--font-body); }
  .link-subtle { background: none; border: none; color: var(--muted-2); cursor: pointer; font-size: 12px; margin-top: 8px; display: inline-block; font-family: var(--font-body); }
  .link-subtle:hover { color: var(--link); text-decoration: underline; }
  .msg { font-size: 13px; margin: 12px 0 0; min-height: 18px; }
  .msg.err { color: var(--error); }
  .msg.ok { color: var(--done); }
  .setup { max-width: 620px; margin: 60px auto; font-size: 14px; color: var(--muted); }
  .setup code { background: var(--later-bg); padding: 2px 6px; border-radius: 5px; font-size: 13px; }
  .loading { color: var(--muted); font-size: 14px; padding: 60px 0; text-align: center; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--ink); color: #fff;
    padding: 12px 20px; border-radius: var(--radius-md); font-size: 13.5px; box-shadow: var(--shadow-lg); z-index: 1000;
    opacity: 0; transition: opacity 200ms, transform 200ms; max-width: min(90vw, 420px); font-family: var(--font-body); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-err { background: var(--error); }

  .confetti-bit { position: fixed; pointer-events: none; z-index: 999;
    animation-name: confetti-fall; animation-timing-function: linear; animation-fill-mode: forwards; }
  @keyframes confetti-fall {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; }
  }
</style>

const HISTORY_LIMIT = 15;
function slaByArea(list) {

/* ---------- CAPTURA INTELIGENTE ----------
   "texto | área | até terça"  ->  área + prazo já preenchidos
   "texto, urgente, até terça" (sem |) -> detecta "urgente" e "até <dia/data>" na frase */
const WEEKDAY_MAP = { domingo: 0, segunda: 1, terca: 2, quarta: 3, quinta: 4, sexta: 5, sabado: 6 };
function stripAccents(s) { return s.normalize("NFD").replace(new RegExp("[\\u0300-\\u036f]", "g"), ""); }
function nextDateForWeekday(dow) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const diff = (dow - today.getDay() + 7) % 7;
  return new Date(today.getTime() + diff * 86400000).toISOString().slice(0, 10);
}
function parseDuePhrase(phrase) {
  const p = stripAccents(phrase.trim().toLowerCase());
  if (/\bhoje\b/.test(p)) return new Date().toISOString().slice(0, 10);
  if (/\bamanha\b/.test(p)) return new Date(Date.now() + 86400000).toISOString().slice(0, 10);
  const dm = p.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
  if (dm) {
    const day = dm[1].padStart(2, "0"), month = dm[2].padStart(2, "0");
    const year = dm[3] ? (dm[3].length === 2 ? "20" + dm[3] : dm[3]) : String(new Date().getFullYear());
    return year + "-" + month + "-" + day;
  }
  const wd = p.match(/\b(domingo|segunda|terca|quarta|quinta|sexta|sabado)\b/);
  if (wd && WEEKDAY_MAP[wd[1]] !== undefined) return nextDateForWeekday(WEEKDAY_MAP[wd[1]]);
  return null;
}
function smartParse(raw) {
  let text = raw.trim(), area = null, urgent = false, due_date = null;
  if (text.includes("|")) {
    const parts = text.split("|").map((s) => s.trim()).filter(Boolean);
    text = parts.shift() || text;
    parts.forEach((p) => {
      if (/\burgente\b/i.test(stripAccents(p))) { urgent = true; return; }
      const d = parseDuePhrase(p);
      if (d) { due_date = d; return; }
      if (!area) area = p;
    });
  } else {
    if (/\burgente\b/i.test(stripAccents(text))) { urgent = true; text = text.replace(/\burgente\b/gi, ""); }
    // Só reconhece "até <palavra de data>" — não engole o resto da frase depois do prazo.
    const DATE_WORD = "(?:hoje|amanh[ãa]|domingo|segunda(?:-feira)?|ter[çc]a(?:-feira)?|quarta(?:-feira)?|quinta(?:-feira)?|sexta(?:-feira)?|s[áa]bado|\\d{1,2}\\/\\d{1,2}(?:\\/\\d{2,4})?)";
    const m = text.match(new RegExp("\\bat[ée]\\s+" + DATE_WORD + "\\b", "i")) || text.match(/\b(hoje|amanh[ãa])\b/i);
    if (m) { const d = parseDuePhrase(m[0]); if (d) { due_date = d; text = text.replace(m[0], ""); } }
    text = text.replace(/\s*,\s*,/g, ",").replace(/,\s*$/, "").replace(/^\s*,\s*/, "").replace(/\s{2,}/g, " ").trim();
  }
  return { text: text || raw.trim(), area, urgent, due_date };
}
function cmpTask(a, b) {
  if (!!a.done !== !!b.done) return a.done ? 1 : -1;
  const au = a.urgent ? 0 : 1, bu = b.urgent ? 0 : 1;
  if (au !== bu) return au - bu;
  const ad = a.due_date || "￿", bd = b.due_date || "￿";
  if (ad !== bd) return ad < bd ? -1 : 1;
  return 0;
}

/* Comemoração ao concluir: sempre nas urgentes, ~1 em 3 nas normais

const CONFETTI_COLORS = ["#CE6363", "#07C1D6", "#7B17A2", "#12C68B", "#8A5A05"];
function celebrate() {
  const n = 90;
  const w = window.innerWidth, h = window.innerHeight;
  for (let i = 0; i < n; i++) {
    const p = document.createElement("div");
    p.className = "confetti-bit";
    const startX = Math.random() * w;
    const drift = (Math.random() - 0.5) * 220;
    const delay = Math.random() * 350;
    const duration = 1500 + Math.random() * 1100;
    const size = 6 + Math.round(Math.random() * 5);
    p.style.left = startX + "px";
    p.style.top = "-20px";
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.borderRadius = i % 2 ? "50%" : "2px";
    p.style.setProperty("--dx", drift + "px");
    p.style.setProperty("--dy", h + 40 + "px");
    p.style.setProperty("--rot", Math.round(360 + Math.random() * 360) + "deg");
    p.style.background = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    p.style.animationDelay = delay + "ms";
    p.style.animationDuration = duration + "ms";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), delay + duration + 50);
  }
}

  html += '<div class="filters">';
  html += '<input type="text" id="searchInput" class="search-input" placeholder="🔎 buscar tarefa…" value="' + esc(searchQuery) + '" />';
  html += '<button class="fchip' + (filters.urgent ? " on" : "") + '" data-ffilter="urgent">' + icon('flame', 13) + ' Urgentes</button>';
  html += '<button class="fchip' + (filters.overdue ? " on" : "") + '" data-ffilter="overdue">' + icon('week', 13) + ' Atrasadas</button>';
  html += '<select data-farea><option value="">Todas as áreas</option><option value="__none__"' + (filters.area === "__none__" ? " selected" : "") + '>Sem área</option>';
  areas.forEach((a) => { html += '<option value="' + esc(a) + '"' + (sameArea(filters.area, a) ? " selected" : "") + '>' + esc(a) + "</option>"; });
  html += "</select>";
  if (filterOn) html += '<button class="fclear" data-fclear>limpar filtro</button>';
  html += "</div>";

  if (filterOn) {
    const parts = [];
    if (filters.urgent) parts.push("urgentes");
    if (filters.overdue) parts.push("atrasadas");
    if (filters.area === "__none__") parts.push("sem área");
    else if (filters.area) parts.push('da área "' + esc(filters.area) + '"');
    html += '<div class="filter-banner">🔎 Mostrando só: ' + parts.join(" + ") + ". Outras tarefas continuam salvas, só estão escondidas.</div>";
  }
  if (justPromoted > 0) {
    html += '<div class="filter-banner">⏰ ' + justPromoted + (justPromoted === 1 ? " tarefa venceu e foi movida" : " tarefas venceram e foram movidas") + ' pra Hoje automaticamente.</div>';
    justPromoted = 0;
  }

  html += weekStripHtml();

  html += '<div class="board">';
  BUCKETS.forEach((b) => {
    let items = tasks.filter((t) => t.bucket === b.id && !t.cleared_at);
    const active = items.filter((t) => !t.done).length;
    const hasDone = items.some((t) => t.done);
    if (filters.urgent) items = items.filter((t) => t.urgent);
    if (filters.overdue) items = items.filter((t) => !t.done && t.due_date && dueStatus(t.due_date) === "overdue");
    if (filters.area === "__none__") items = items.filter((t) => !t.area);
    else if (filters.area) items = items.filter((t) => sameArea(t.area, filters.area));
    if (searchOn) {
      const q = stripAccents(searchQuery.trim().toLowerCase());
      items = items.filter((t) => stripAccents((t.text || "").toLowerCase()).includes(q));
    }
    items = items.slice().sort(cmpTask);
    const expanded = !!expandedCols[b.id];
    const visible = expanded ? items : items.slice(0, COL_LIMIT);
    const hidden = items.length - visible.length;
    html += '<div class="col" data-b="' + b.id + '"><div class="col-head">';
    html += '<span class="col-title"><span class="bicon bi-' + b.id + '">' + icon(BUCKET_ICON[b.id], 15) + '</span>' + b.title + "</span>";
    let sub = b.id === "hoje" ? active + "/3" + (active > 3 ? " — foca!" : "") : items.length + " · " + b.sub;
    html += '<span class="col-sub' + (b.id === "hoje" && active > 3 ? " over" : "") + '">' + sub + "</span></div>";
    if (b.id === "hoje" && active > 3) html += '<div class="limit-banner">Mais de 3 em Hoje — considera mover alguma pra Esta semana.</div>';
    if (!items.length) html += '<div class="empty-note">' + (filterOn || searchOn ? "nenhuma com esse filtro" : b.emptyMsg) + "</div>";
    visible.forEach((t) => {
      const due = t.due_date ? dueStatus(t.due_date) : "";
      html += '<div class="task' + (t.done ? " done" : "") + '" data-id="' + t.id + '"><div class="task-row">';
      html += '<input type="checkbox" class="cb" data-toggle="' + t.id + '"' + (t.done ? " checked" : "") + " />";
      html += '<span class="txt" data-open="' + t.id + '">';
      if (t.source === "slack") html += '<span class="tag-source" title="Capturada pelo Slack">' + icon('message', 11) + ' Slack</span>';
      if (t.urgent) html += '<span class="tag-urgent" title="urgente">' + icon('flame', 14) + '</span>';
      html += esc(t.text);
      if (t.area) html += '<span class="tag-area">' + esc(t.area) + '</span>';
      if (t.due_date) html += '<span class="tag-due' + (due ? " tag-due-" + due : "") + '">' + fmtDue(t.due_date) + '</span>';
      if (t.waiting_on) html += '<span class="tag-wait">⏳ ' + esc(t.waiting_on) + '</span>';
      html += "</span>";
      html += '<span class="chev" data-open="' + t.id + '">' + icon('chevron', 14) + '</span>';
      html += '<button class="x" data-del="' + t.id + '" title="remover">' + icon('close', 13) + '</button></div><div class="move">';
      html += '<select class="move-select" data-moveto="' + t.id + '"><option value="">mover para…</option>';
      CHIPS.filter((c) => c.b !== b.id).forEach((c) => { html += '<option value="' + c.b + '">' + c.label + "</option>"; });
      html += '</select><div class="meta-row">';
      html += '<input type="text" class="meta-text" data-text="' + t.id + '" value="' + esc(t.text) + '" placeholder="texto da tarefa" />';
      html += '<input type="text" data-area="' + t.id + '" list="areaList" placeholder="área" value="' + esc(t.area || "") + '" />';
      html += '<input type="date" data-due="' + t.id + '" value="' + (t.due_date || "") + '" />';
      html += '<button class="meta-urgent-btn' + (t.urgent ? " on" : "") + '" data-urgent="' + t.id + '">' + icon('flame', 13) + ' urgente</button>';
      if (b.id === "aguardando") html += '<input type="text" data-waiting="' + t.id + '" placeholder="aguardando quem?" value="' + esc(t.waiting_on || "") + '" />';
      html += "</div></div></div>";
    });
    if (hidden > 0) html += '<button class="clearbtn" data-more="' + b.id + '">ver mais (' + hidden + ')</button>';
    else if (expanded && items.length > COL_LIMIT) html += '<button class="clearbtn" data-less="' + b.id + '">ver menos</button>';
    if (hasDone) html += '<button class="clearbtn" data-clear="' + b.id + '">limpar concluídas</button>';
    html += "</div>";
  });
  html += "</div>";

  const doneCount = tasks.filter((t) => t.done).length;
  html +=
    '<details class="method"><summary>Histórico de concluídas (' + doneCount + ")</summary><div class=\"method-body\">" +
    historyHtml(tasks) +
    "</div></details>";

  if (methodOpen === null) {
    methodOpen = !localStorage.getItem("yuca_method_seen");
    localStorage.setItem("yuca_method_seen", "1");
  }
  html +=
    '<details class="method"' + (methodOpen ? " open" : "") + '><summary>Como usar (o método)</summary><div class="method-body">' +
    '<p class="method-kicker">Todo dia (10 min)</p>' +
    "<ol>" +
      "<li>Esvazia a caixa de captura: decide o balde de cada item.</li>" +
      '<li>Escolhe no máximo 3 tarefas pra <b>Hoje</b>.</li>' +
      "<li>No fim do dia, limpa as que já terminou.</li>" +
    "</ol>" +
    '<p class="method-kicker">Toda segunda (semanal)</p>' +
    "<ol>" +
      "<li>Zera a caixa de captura de novo.</li>" +
      '<li>Olha o <b>Aguardando</b> e cobra quem te deve resposta.</li>' +
      '<li>Nas tarefas grandes de <b>Esta semana</b>, define o próximo passo de cada uma.</li>' +
    "</ol>" +
    '<p class="method-kicker">Ficou em dúvida de onde encaixar uma tarefa?</p>' +
    "<p>Pergunta pra ela:</p>" +
    "<ul>" +
      "<li>Isso empurra uma meta importante (da semana ou do Feirão)?</li>" +
      "<li>Tem um prazo real?</li>" +
      "<li>Tem alguém esperando por você?</li>" +
    "</ul>" +
    '<div class="method-rule">' +
      '<span><b>2 sim</b> → Hoje</span>' +
      '<span><b>1 sim</b> → Esta semana</span>' +
      '<span><b>0 sim</b> → Depois</span>' +
    "</div>" +
    "</div></details>";

  root.innerHTML = html;

  document.getElementById("out").onclick = signOut;
  const cap = async () => {
    const el = document.getElementById("capInput");
    const v = el.value.trim();
    if (!v || capturing) return;
    capturing = true;
    refocusCapture = true;
    const overrides = { urgent: quickUrgent, due_date: quickDue || null };
    quickUrgent = false;
    quickDue = "";
    el.value = "";
    try { await addTask(v, overrides); } finally { capturing = false; }
  };
  document.getElementById("capBtn").onclick = cap;
  document.getElementById("capInput").addEventListener("keydown", (e) => { if (e.key === "Enter") cap(); });
  document.getElementById("capUrgent").onclick = () => { quickUrgent = !quickUrgent; renderApp(); };
  document.getElementById("capDue").onchange = (e) => { quickDue = e.target.value; };

  if (refocusCapture) {
    refocusCapture = false;
    const ci = document.getElementById("capInput");
    if (ci) ci.focus();
  }

  const searchEl = document.getElementById("searchInput");
  if (searchEl) {
    searchEl.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      refocusSearch = true;
      renderApp();
    });
    if (refocusSearch) {
      refocusSearch = false;
      searchEl.focus();
      searchEl.setSelectionRange(searchEl.value.length, searchEl.value.length);
    }
  }

  const methodEl = document.querySelector("details.method");
  if (methodEl) methodEl.addEventListener("toggle", () => { methodOpen = methodEl.open; });
}

/* Atalho global: "/" foca a captura de qualquer lugar da página
   (a menos que já esteja digitando em outro campo). */
document.addEventListener("keydown", (e) => {
  if (e.key !== "/") return;
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
  e.preventDefault();
  const ci = document.getElementById("capInput");
  if (ci) ci.focus();
});

/* Anexados uma única vez em #root (que nunca é recriado) — evita acumular
   listeners duplicados a cada renderApp() e o toggle "cancelar a si mesmo". */
root.addEventListener("click", (e) => {
  const moveBtn = e.target.closest("[data-move]");
  const delBtn = e.target.closest("[data-del]");
  const clearBtn = e.target.closest("[data-clear]");
  const urgentBtn = e.target.closest("[data-urgent]");
  const moreBtn = e.target.closest("[data-more]");
  const lessBtn = e.target.closest("[data-less]");
  const openEl = e.target.closest("[data-open]");
  const ffilterBtn = e.target.closest("[data-ffilter]");
  const fclearBtn = e.target.closest("[data-fclear]");
  if (moveBtn) moveTask(moveBtn.dataset.move, moveBtn.dataset.to);
  else if (delBtn) {
    const id = delBtn.dataset.del;
    const t = tasks.find((x) => x.id === id);
    if (confirm('Remover "' + (t ? t.text : "essa tarefa") + '"?')) delTask(id);
  }
  else if (clearBtn) { if (confirm("Tirar as concluídas da vista? (continuam salvas no histórico)")) clearDone(clearBtn.dataset.clear); }
  else if (urgentBtn) { const id = urgentBtn.dataset.urgent; const t = tasks.find((x) => x.id === id); toggleUrgent(id, t && t.urgent); }
  else if (moreBtn) { expandedCols[moreBtn.dataset.more] = true; renderApp(); }
  else if (lessBtn) { delete expandedCols[lessBtn.dataset.less]; renderApp(); }
  else if (ffilterBtn) { const k = ffilterBtn.dataset.ffilter; filters[k] = !filters[k]; renderApp(); }
  else if (fclearBtn) { filters = { urgent: false, overdue: false, area: "" }; renderApp(); }
  else if (openEl) { const el = root.querySelector('.task[data-id="' + openEl.dataset.open + '"]'); if (el) el.classList.toggle("open"); }
});
root.addEventListener("change", (e) => {
  if (e.target.dataset.toggle) {
    const id = e.target.dataset.toggle;
    const checked = e.target.checked;
    if (checked) maybeCelebrate(tasks.find((x) => x.id === id));
    toggleTask(id, checked);
  }
  else if (e.target.dataset.due) updateDue(e.target.dataset.due, e.target.value);
  else if (e.target.dataset.moveto) { if (e.target.value) moveTask(e.target.dataset.moveto, e.target.value); }
  else if (e.target.dataset.farea !== undefined) { filters.area = e.target.value; renderApp(); }
});
root.addEventListener("focusout", (e) => {
  if (e.target.dataset.area) updateArea(e.target.dataset.area, e.target.value.trim());
  else if (e.target.dataset.text) updateText(e.target.dataset.text, e.target.value);
  else if (e.target.dataset.waiting) updateWaitingOn(e.target.dataset.waiting, e.target.value.trim());
});

boot();
</script>
</body>
</html>
