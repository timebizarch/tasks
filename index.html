<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meu dia · organizador Yuca</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Yuca brand tokens — Manual de Marca Yuca */
    --paper: #FDFAF7; --card: #FFFFFF; --ink: #062840; --muted: #425158; --muted-2: #8E9BA1;
    --line: #DDE1E3; --line-strong: #BBC3C7; --done: #13C081;
    --accent: #12C68B; --accent-dark: #098C7B; --accent-lighten: #F2FBF7;
    --today: #CE6363; --today-bg: #FEF5F5;
    --week: #07C1D6; --week-bg: #EEF7FB;
    --wait: #7B17A2; --wait-bg: #FDFAFF;
    --later: #8E9BA1; --later-bg: #F4F5F6;
    --error: #D1436E; --error-bg: #FDF4F4;
    --alert: #B4790A; --alert-bg: #FFFAF1;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px; --radius-pill: 999px;
    --shadow-sm: 0 2px 6px rgba(16,36,54,.06), 0 1px 2px rgba(16,36,54,.04);
    --shadow-md: 0 6px 16px rgba(16,36,54,.08), 0 2px 4px rgba(16,36,54,.04);
    --shadow-lg: 0 20px 48px rgba(6,40,64,.16), 0 4px 10px rgba(6,40,64,.08);
    --shadow-focus: 0 0 0 3px rgba(19,192,129,.25);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Montserrat', system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--font-body); line-height: 1.45; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 28px 20px 60px; }

  header.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
  h1 { font-family: var(--font-display); font-size: 25px; font-weight: 700; letter-spacing: -0.01em; margin: 0; display: flex; align-items: center; gap: 9px; }
  h1 .logo { flex: none; }
  h1 span { color: var(--muted); font-weight: 500; font-size: 0.8em; }
  .who { color: var(--muted); font-size: 13px; }
  .who button { border: none; background: none; color: var(--accent-dark); cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0 0 0 8px; }
  .date { color: var(--muted); font-size: 13px; text-transform: capitalize; margin-bottom: 20px; }

  .capture { display: flex; gap: 8px; margin-bottom: 6px; }
  .capture input { flex: 1; font-size: 15px; padding: 13px 15px; border: 1.5px solid var(--line); border-radius: var(--radius-md); background: var(--card); color: var(--ink); outline: none; font-family: var(--font-body); transition: border-color 150ms, box-shadow 150ms; }
  .capture input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .capture button { border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; padding: 0 20px; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font-body); transition: background 150ms; }
  .capture button:hover { background: var(--accent-dark); }
  .hint { color: var(--muted); font-size: 12.5px; margin: 0 2px 20px; }

  .inbox { background: var(--card); border: 1.5px dashed var(--line-strong); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 22px; }
  .inbox.empty { display: none; }
  .inbox h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 10px; font-weight: 700; }
  .inbox-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-top: 1px solid var(--line); }
  .inbox-item:first-of-type { border-top: none; }
  .inbox-item .txt { flex: 1; font-size: 14.5px; }
  .chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip { border: 1px solid var(--line); background: var(--paper); border-radius: var(--radius-pill); font-size: 11.5px; padding: 4px 10px; cursor: pointer; color: var(--ink); white-space: nowrap; font-family: var(--font-body); }
  .chip:hover { border-color: var(--ink); }
  .chip.c-today:hover { background: var(--today-bg); border-color: var(--today); }
  .chip.c-week:hover { background: var(--week-bg); border-color: var(--week); }
  .chip.c-wait:hover { background: var(--wait-bg); border-color: var(--wait); }
  .chip.c-later:hover { background: var(--later-bg); border-color: var(--later); }
  .x { border: none; background: none; color: var(--muted-2); cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 4px; }
  .x:hover { color: var(--error); }

  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 860px) { .board { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 560px) { .board { grid-template-columns: 1fr; } }
  .col { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius-lg); padding: 14px; min-height: 120px; box-shadow: var(--shadow-sm); }
  .col-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .col-title { font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .bicon { display: inline-flex; }
  .bi-hoje { color: var(--today); } .bi-semana { color: var(--week); }
  .bi-aguardando { color: var(--wait); } .bi-depois { color: var(--later); }
  .col-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
  .col[data-b="hoje"] { border-top: 3px solid var(--today); }
  .col[data-b="semana"] { border-top: 3px solid var(--week); }
  .col[data-b="aguardando"] { border-top: 3px solid var(--wait); }
  .col[data-b="depois"] { border-top: 3px solid var(--later); }
  .over { color: var(--error); font-weight: 700; }

  .task { border-top: 1px solid var(--line); padding: 9px 0; }
  .task:first-of-type { border-top: none; }
  .task-row { display: flex; align-items: flex-start; gap: 9px; }
  .cb { margin-top: 3px; width: 16px; height: 16px; cursor: pointer; accent-color: var(--done); flex: none; }
  .task .txt { flex: 1; font-size: 14px; cursor: pointer; }
  .task.done .txt { text-decoration: line-through; color: var(--muted-2); }
  .task .move { display: none; flex-direction: column; gap: 8px; margin: 8px 0 2px 25px; }
  .task.open .move { display: flex; }
  .move-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .empty-note { color: var(--muted-2); font-size: 12.5px; font-style: italic; padding: 4px 0; }

  .tag-urgent { color: var(--error); margin-right: 3px; }
  .tag-area, .tag-due { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill); margin-left: 6px; background: var(--later-bg); color: var(--muted); white-space: nowrap; }
  .tag-due-today { background: var(--alert-bg); color: var(--alert); font-weight: 600; }
  .tag-due-overdue { background: var(--error-bg); color: var(--error); font-weight: 700; }

  .meta-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .meta-row input { font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: var(--radius-sm); font-family: var(--font-body); background: var(--card); color: var(--ink); outline: none; }
  .meta-row input[data-area] { width: 120px; }
  .meta-row input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .meta-urgent-btn { font-size: 12px; border: 1px solid var(--line); background: var(--card); border-radius: var(--radius-pill); padding: 5px 11px; cursor: pointer; font-family: var(--font-body); color: var(--muted); }
  .meta-urgent-btn.on { background: var(--error-bg); border-color: var(--error); color: var(--error); font-weight: 700; }
  .clearbtn { margin-top: 8px; border: none; background: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 2px 0; font-family: var(--font-body); }
  .clearbtn:hover { color: var(--done); }

  details.method { margin-top: 30px; border: 1.5px solid var(--line); border-radius: var(--radius-lg); background: var(--card); padding: 4px 18px; }
  details.method summary { cursor: pointer; font-size: 13px; font-weight: 700; padding: 12px 0; list-style: none; }
  details.method summary::-webkit-details-marker { display: none; }
  details.method summary::before { content: "▸ "; color: var(--accent-dark); }
  details.method[open] summary::before { content: "▾ "; }
  .method-body { font-size: 13.5px; color: var(--muted); padding-bottom: 16px; }
  .method-body b { color: var(--ink); }
  .method-body p { margin: 0 0 10px; }

  .auth-wrap { display: grid; grid-template-columns: 1.05fr 1fr; min-height: 560px; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); background: var(--card); margin-top: 16px; }
  @media (max-width: 760px) { .auth-wrap { grid-template-columns: 1fr; min-height: auto; margin-top: 0; } }

  .auth-art { position: relative; overflow: hidden; background: linear-gradient(155deg, var(--ink) 0%, var(--accent-dark) 100%); display: flex; flex-direction: column; justify-content: center; padding: 52px 48px; color: #fff; }
  @media (max-width: 760px) { .auth-art { padding: 40px 28px 52px; } }
  .auth-art .blob { position: absolute; border-radius: 50%; filter: blur(46px); pointer-events: none; }
  .auth-art .blob-1 { width: 240px; height: 240px; background: var(--today); opacity: .55; top: -70px; right: -60px; }
  .auth-art .blob-2 { width: 210px; height: 210px; background: var(--wait); opacity: .5; bottom: -70px; left: -50px; }
  .auth-art .blob-3 { width: 170px; height: 170px; background: var(--week); opacity: .35; bottom: 26px; right: 30px; }
  .auth-art-logo { position: relative; z-index: 1; margin-bottom: 22px; }
  .auth-art h2 { position: relative; z-index: 1; font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1.25; margin: 0 0 12px; max-width: 360px; }
  .auth-art p { position: relative; z-index: 1; font-size: 14px; line-height: 1.55; opacity: .88; max-width: 320px; margin: 0; }

  .auth-form-col { display: flex; align-items: center; justify-content: center; padding: 40px 32px; }
  .center { max-width: 320px; width: 100%; margin: 0; }
  .center h1 { margin-bottom: 6px; }
  .center p { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
  .field { display: block; margin-bottom: 12px; }
  .field input { width: 100%; font-size: 15px; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: var(--radius-md); outline: none; font-family: var(--font-body); background: var(--card); color: var(--ink); transition: border-color 150ms, box-shadow 150ms; }
  .field input:focus { border-color: var(--accent); box-shadow: var(--shadow-focus); }
  .primary { width: 100%; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; padding: 13px; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font-body); transition: background 150ms; }
  .primary:hover { background: var(--accent-dark); }
  .link { background: none; border: none; color: var(--accent-dark); cursor: pointer; font-size: 13.5px; text-decoration: underline; margin-top: 14px; display: inline-block; font-family: var(--font-body); }
  .msg { font-size: 13px; margin: 12px 0 0; min-height: 18px; }
  .msg.err { color: var(--error); }
  .msg.ok { color: var(--done); }
  .setup { max-width: 620px; margin: 60px auto; font-size: 14px; color: var(--muted); }
  .setup code { background: var(--later-bg); padding: 2px 6px; border-radius: 5px; font-size: 13px; }
  .loading { color: var(--muted); font-size: 14px; padding: 60px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap" id="root"><div class="loading">Carregando…</div></div>

<script>
/* ============================================================
   1) COLE SUAS DUAS CHAVES PÚBLICAS DO SUPABASE AQUI.
   Project Settings > API. São as chaves "URL" e "anon public".
   (A chave anon é pública por design — a proteção real vem do
   login + row-level security que você vai ligar no SQL.)
   ============================================================ */
const SUPABASE_URL = "https://aaqshcyuxmeatpilcmgp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uD-_uFrzj10uTSxrQm4TZA_ezJEgkf-";

const BUCKETS = [
  { id: "hoje", title: "Hoje", sub: "máx. 3 chave" },
  { id: "semana", title: "Esta semana", sub: "complexas" },
  { id: "aguardando", title: "Aguardando", sub: "depende de alguém" },
  { id: "depois", title: "Depois", sub: "não perder" },
];
const CHIPS = [
  { b: "hoje", label: "Hoje", cls: "c-today" },
  { b: "semana", label: "Semana", cls: "c-week" },
  { b: "aguardando", label: "Aguardando", cls: "c-wait" },
  { b: "depois", label: "Depois", cls: "c-later" },
];

function yucaLogo(color, h) {
  return '<svg class="logo" height="' + h + '" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Yuca">' +
    '<path d="M 56 32 L 32 32 L 32 86" stroke="' + color + '" stroke-width="7" stroke-linecap="square" fill="none"/>' +
    '<path d="M 144 168 L 168 168 L 168 114" stroke="' + color + '" stroke-width="7" stroke-linecap="square" fill="none"/>' +
    '<text x="100" y="92" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="2" fill="' + color + '">YU</text>' +
    '<text x="100" y="148" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="2" fill="' + color + '">CA</text>' +
    '</svg>';
}
const LOGO = yucaLogo('#12C68B', 30);
const LOGO_WHITE = yucaLogo('#FFFFFF', 46);

const ICON_D = {
  today: 'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',
  week: 'M3 6h18v15H3zM3 6V4a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v2M8 2v4M16 2v4M3 10h18',
  close: 'M18 6L6 18M6 6l12 12',
  plus: 'M12 5v14M5 12h14',
  flame: 'M12 2c1 3-1.5 4.5-3 7-1 1.7-1.5 3-1.5 4.5a4.5 4.5 0 0 0 9 0c0-1.8-.7-3-1.8-4.3.1 1.6-.6 2.5-1.5 2.5-1.2 0-1.7-1-1.2-2.2C13 7.5 12.5 4.5 12 2z',
};
const ICON_EXTRA = {
  wait: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>',
  later: '<path d="M3 3h18v4H3z"/><path d="M5 7v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V7"/><path d="M10 12h4"/>',
};
function icon(name, size, style) {
  size = size || 15;
  const inner = ICON_EXTRA[name] || ('<path d="' + ICON_D[name] + '"/>');
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="flex:none;vertical-align:-3px;' + (style || '') + '">' + inner + '</svg>';
}
const BUCKET_ICON = { hoje: 'today', semana: 'week', aguardando: 'wait', depois: 'later' };

function dueStatus(iso) {
  if (!iso) return "";
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const d = new Date(iso + "T00:00:00");
  if (d < today) return "overdue";
  if (d.getTime() === today.getTime()) return "today";
  return "";
}
function fmtDue(iso) { const [, m, d] = iso.split("-"); return d + "/" + m; }

const root = document.getElementById("root");
const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
let sb = null, tasks = [], userEmail = "";
const COL_LIMIT = 6;
let expandedCols = {};

function boot() {
  if (SUPABASE_URL.startsWith("COLE_") || SUPABASE_ANON_KEY.startsWith("COLE_")) {
    root.innerHTML =
      '<div class="setup"><h1>Falta configurar</h1>' +
      "<p>Abra o arquivo <code>index.html</code>, cole sua <code>URL</code> e sua <code>anon key</code> do Supabase no topo do script (bloco marcado) e publique de novo. O passo a passo completo está na conversa com a Claude.</p></div>";
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.onAuthStateChange((_e, session) => {
    if (session && session.user) { userEmail = session.user.email; loadAndRender(); }
    else renderAuth();
  });
}

/* ---------- AUTH ---------- */
function renderAuth(mode) {
  mode = mode || "in";
  const signup = mode === "up";
  root.innerHTML =
    '<div class="auth-wrap">' +
      '<div class="auth-art">' +
        '<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>' +
        '<div class="auth-art-logo">' + LOGO_WHITE + '</div>' +
        '<h2>Separe captura, priorização e execução.</h2>' +
        '<p>Um lugar só pra tudo que chega — e um jeito simples de decidir o que importa agora.</p>' +
      '</div>' +
      '<div class="auth-form-col"><div class="center">' +
        '<h1>' + (signup ? "Criar acesso" : "Entrar") + '</h1>' +
        '<p>' + (signup ? "Crie seu acesso." : "Entre para ver suas tarefas.") + '</p>' +
        '<label class="field"><input id="email" type="email" placeholder="e-mail" autocomplete="username" /></label>' +
        '<label class="field"><input id="pass" type="password" placeholder="senha" autocomplete="current-password" /></label>' +
        '<button class="primary" id="go">' + (signup ? "Criar acesso" : "Entrar") + "</button>" +
        '<div class="msg" id="msg"></div>' +
        '<button class="link" id="swap">' + (signup ? "Já tenho acesso — entrar" : "Primeira vez? Criar acesso") + "</button>" +
      '</div></div>' +
    '</div>';

  document.getElementById("swap").onclick = () => renderAuth(signup ? "in" : "up");
  document.getElementById("go").onclick = doAuth(signup);
  ["email", "pass"].forEach((id) =>
    document.getElementById(id).addEventListener("keydown", (e) => { if (e.key === "Enter") doAuth(signup)(); })
  );
}
function doAuth(signup) {
  return async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass").value;
    const msg = document.getElementById("msg");
    msg.className = "msg"; msg.textContent = "…";
    try {
      if (signup) {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        msg.className = "msg ok";
        msg.textContent = "Acesso criado. Se pedir confirmação, confira seu e-mail e depois entre.";
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (e) { msg.className = "msg err"; msg.textContent = e.message || "Não deu certo, tente de novo."; }
  };
}
async function signOut() { await sb.auth.signOut(); }

/* ---------- DADOS ---------- */
async function loadAndRender(quiet) {
  if (!quiet) root.innerHTML = '<div class="loading">Carregando suas tarefas…</div>';
  const { data, error } = await sb.from("tasks").select("*").order("created_at", { ascending: true });
  if (error) { root.innerHTML = '<div class="loading">Erro ao carregar: ' + esc(error.message) + "</div>"; return; }
  tasks = data || [];
  renderApp();
}
async function addTask(text) {
  const { error } = await sb.from("tasks").insert({ text, bucket: "inbox", done: false });
  if (!error) loadAndRender(true);
}
async function moveTask(id, to) {
  const { error } = await sb.from("tasks").update({ bucket: to, done: false }).eq("id", id);
  if (!error) loadAndRender(true);
}
async function toggleTask(id, done) {
  const { error } = await sb.from("tasks").update({ done }).eq("id", id);
  if (!error) loadAndRender(true);
}
async function delTask(id) {
  const { error } = await sb.from("tasks").delete().eq("id", id);
  if (!error) loadAndRender(true);
}
async function clearDone(bucket) {
  const { error } = await sb.from("tasks").delete().eq("bucket", bucket).eq("done", true);
  if (!error) loadAndRender(true);
}
async function updateArea(id, area) {
  const { error } = await sb.from("tasks").update({ area: area || null }).eq("id", id);
  if (!error) loadAndRender(true);
}
async function updateDue(id, due) {
  const { error } = await sb.from("tasks").update({ due_date: due || null }).eq("id", id);
  if (!error) loadAndRender(true);
}
async function toggleUrgent(id, current) {
  const { error } = await sb.from("tasks").update({ urgent: !current }).eq("id", id);
  if (!error) loadAndRender(true);
}

/* ---------- APP ---------- */
function renderApp() {
  const inbox = tasks.filter((t) => t.bucket === "inbox");
  const areas = Array.from(new Set(tasks.map((t) => t.area).filter(Boolean)));
  let html = '<datalist id="areaList">' + areas.map((a) => '<option value="' + esc(a) + '">').join("") + '</datalist>' +
    '<header class="top"><h1>' + LOGO + 'Meu dia <span>· organizador</span></h1>' +
    '<div class="who">' + esc(userEmail) + '<button id="out">sair</button></div></header>' +
    '<div class="date">' + new Date().toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" }) + "</div>" +
    '<div class="capture"><input id="capInput" placeholder="Anota qualquer coisa que chegou… (Enter pra capturar)" autocomplete="off" />' +
    '<button id="capBtn">' + icon('plus', 15) + ' Capturar</button></div>' +
    '<p class="hint">Capturar não é decidir. Joga tudo aqui primeiro e organiza depois.</p>';

  html += '<div class="inbox' + (inbox.length ? "" : " empty") + '"><h2>' + icon('later', 13) + ' Caixa de captura (' + inbox.length + ")</h2>";
  inbox.forEach((t) => {
    html += '<div class="inbox-item"><span class="txt">' + esc(t.text) + '</span><span class="chips">';
    CHIPS.forEach((c) => { html += '<button class="chip ' + c.cls + '" data-move="' + t.id + '" data-to="' + c.b + '">' + c.label + "</button>"; });
    html += '</span><button class="x" data-del="' + t.id + '" title="descartar">' + icon('close', 13) + '</button></div>';
  });
  html += "</div>";

  html += '<div class="board">';
  BUCKETS.forEach((b) => {
    const items = tasks.filter((t) => t.bucket === b.id);
    const active = items.filter((t) => !t.done).length;
    const hasDone = items.some((t) => t.done);
    const expanded = !!expandedCols[b.id];
    const visible = expanded ? items : items.slice(0, COL_LIMIT);
    const hidden = items.length - visible.length;
    html += '<div class="col" data-b="' + b.id + '"><div class="col-head">';
    html += '<span class="col-title"><span class="bicon bi-' + b.id + '">' + icon(BUCKET_ICON[b.id], 15) + '</span>' + b.title + "</span>";
    let sub = b.id === "hoje" ? active + "/3" + (active > 3 ? " — foca!" : "") : items.length + " · " + b.sub;
    html += '<span class="col-sub' + (b.id === "hoje" && active > 3 ? " over" : "") + '">' + sub + "</span></div>";
    if (!items.length) html += '<div class="empty-note">vazio</div>';
    visible.forEach((t) => {
      const due = t.due_date ? dueStatus(t.due_date) : "";
      html += '<div class="task' + (t.done ? " done" : "") + '" data-id="' + t.id + '"><div class="task-row">';
      html += '<input type="checkbox" class="cb" data-toggle="' + t.id + '"' + (t.done ? " checked" : "") + " />";
      html += '<span class="txt" data-open="' + t.id + '">';
      if (t.urgent) html += '<span class="tag-urgent" title="urgente">' + icon('flame', 14) + '</span>';
      html += esc(t.text);
      if (t.area) html += '<span class="tag-area">' + esc(t.area) + '</span>';
      if (t.due_date) html += '<span class="tag-due' + (due ? " tag-due-" + due : "") + '">' + fmtDue(t.due_date) + '</span>';
      html += "</span>";
      html += '<button class="x" data-del="' + t.id + '" title="remover">' + icon('close', 13) + '</button></div><div class="move">';
      html += '<div class="move-chips">';
      CHIPS.filter((c) => c.b !== b.id).forEach((c) => { html += '<button class="chip ' + c.cls + '" data-move="' + t.id + '" data-to="' + c.b + '">→ ' + c.label + "</button>"; });
      html += '</div><div class="meta-row">';
      html += '<input type="text" data-area="' + t.id + '" list="areaList" placeholder="área" value="' + esc(t.area || "") + '" />';
      html += '<input type="date" data-due="' + t.id + '" value="' + (t.due_date || "") + '" />';
      html += '<button class="meta-urgent-btn' + (t.urgent ? " on" : "") + '" data-urgent="' + t.id + '">' + icon('flame', 13) + ' urgente</button>';
      html += "</div></div></div>";
    });
    if (hidden > 0) html += '<button class="clearbtn" data-more="' + b.id + '">ver mais (' + hidden + ')</button>';
    else if (expanded && items.length > COL_LIMIT) html += '<button class="clearbtn" data-less="' + b.id + '">ver menos</button>';
    if (hasDone) html += '<button class="clearbtn" data-clear="' + b.id + '">limpar concluídas</button>';
    html += "</div>";
  });
  html += "</div>";

  html +=
    '<details class="method"><summary>Como usar (o método)</summary><div class="method-body">' +
    "<p><b>Ritual diário (10 min):</b> esvazia a captura, escolhe até 3 chave pro Hoje, distribui o resto. No fim do dia, limpa as concluídas.</p>" +
    "<p><b>Ritual semanal (segunda):</b> zera a captura, revê o Aguardando e cobra quem precisa, quebra as de Esta semana em próximos passos.</p>" +
    '<p><b>Priorização, na dúvida:</b> move uma meta da semana / do Feirão? tem prazo real? tem alguém bloqueado te esperando? Dois "sim" = Hoje. Um = Semana. Nenhum = Depois.</p>' +
    "</div></details>";

  root.innerHTML = html;

  document.getElementById("out").onclick = signOut;
  const cap = () => { const el = document.getElementById("capInput"); const v = el.value.trim(); if (v) { addTask(v); el.value = ""; } };
  document.getElementById("capBtn").onclick = cap;
  document.getElementById("capInput").addEventListener("keydown", (e) => { if (e.key === "Enter") cap(); });
}

/* Anexados uma única vez em #root (que nunca é recriado) — evita acumular
   listeners duplicados a cada renderApp() e o toggle "cancelar a si mesmo". */
root.addEventListener("click", (e) => {
  const moveBtn = e.target.closest("[data-move]");
  const delBtn = e.target.closest("[data-del]");
  const clearBtn = e.target.closest("[data-clear]");
  const urgentBtn = e.target.closest("[data-urgent]");
  const moreBtn = e.target.closest("[data-more]");
  const lessBtn = e.target.closest("[data-less]");
  const openEl = e.target.closest("[data-open]");
  if (moveBtn) moveTask(moveBtn.dataset.move, moveBtn.dataset.to);
  else if (delBtn) delTask(delBtn.dataset.del);
  else if (clearBtn) clearDone(clearBtn.dataset.clear);
  else if (urgentBtn) { const id = urgentBtn.dataset.urgent; const t = tasks.find((x) => x.id === id); toggleUrgent(id, t && t.urgent); }
  else if (moreBtn) { expandedCols[moreBtn.dataset.more] = true; renderApp(); }
  else if (lessBtn) { delete expandedCols[lessBtn.dataset.less]; renderApp(); }
  else if (openEl) { const el = root.querySelector('.task[data-id="' + openEl.dataset.open + '"]'); if (el) el.classList.toggle("open"); }
});
root.addEventListener("change", (e) => {
  if (e.target.dataset.toggle) toggleTask(e.target.dataset.toggle, e.target.checked);
  else if (e.target.dataset.due) updateDue(e.target.dataset.due, e.target.value);
});
root.addEventListener("focusout", (e) => {
  if (e.target.dataset.area) updateArea(e.target.dataset.area, e.target.value.trim());
});

boot();
</script>
</body>
</html>
